name: CICD Build
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Make
        run: |
          make clean all

      - name: Test
        run: |
          make test
